<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#09090c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="P40H">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<title>Project 40 Hardly</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090c;
    --surface: rgba(255,255,255,0.04);
    --surface2: rgba(255,255,255,0.07);
    --border: rgba(200,169,110,0.15);
    --gold: #c8a96e;
    --gold-dim: rgba(200,169,110,0.4);
    --gold-faint: rgba(200,169,110,0.08);
    --text: #ede8de;
    --text-dim: #8a7d68;
    --text-mute: #3d3528;
    --green: #5cb87a;
    --green-faint: rgba(92,184,122,0.12);
    --red: #c06060;
    --nav-h: 64px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
    overscroll-behavior: none;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(9,9,12,0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 10px;
    padding-top: calc(14px + env(safe-area-inset-top));
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .app-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .countdown-badge { text-align: right; }
  .countdown-days { font-size: 22px; font-weight: 700; color: var(--gold); line-height: 1; }
  .countdown-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }

  .date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
  }
  .date-nav button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    padding: 6px 14px;
    border-radius: 8px;
    transition: color 0.15s;
    min-width: 44px;
    min-height: 44px;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .date-nav button:hover { color: var(--gold); }
  .date-nav button:disabled { opacity: 0.2; cursor: default; }
  .date-display { font-size: 15px; font-weight: 500; color: var(--text); }
  .date-today-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ── Nav ── */
  .nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: calc(var(--nav-h) + env(safe-area-inset-bottom));
    background: rgba(9,9,12,0.97);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 10;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: color 0.15s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn.active { color: var(--gold); }
  .nav-btn svg { display: block; }

  /* ── Sections ── */
  .section { display: none; padding: 20px 16px; }
  .section.active { display: block; }

  /* ── Score ring ── */
  .score-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 0 16px;
  }
  .ring-container { position: relative; width: 96px; height: 96px; }
  .ring-container svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--text-mute); stroke-width: 5; }
  .ring-fill { fill: none; stroke: var(--gold); stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; }
  .ring-text {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-score { font-size: 24px; font-weight: 700; color: var(--gold); line-height: 1; }
  .ring-total { font-size: 11px; color: var(--text-dim); }

  /* ── Goal cards ── */
  .goal-group-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-dim); margin: 20px 0 8px;
  }
  .goal-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid transparent;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .goal-card:active { transform: scale(0.98); }
  .goal-card.checked { background: var(--green-faint); border-color: rgba(92,184,122,0.25); }
  .goal-icon { font-size: 22px; width: 28px; text-align: center; flex-shrink: 0; }
  .goal-text { flex: 1; min-width: 0; }
  .goal-label { font-size: 15px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 5px; }
  .goal-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .goal-check {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--text-mute);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .goal-card.checked .goal-check { background: var(--green); border-color: var(--green); }
  .goal-check svg { display: none; }
  .goal-card.checked .goal-check svg { display: block; }

  /* ── Weight & Note ── */
  .field-group { margin-top: 20px; }
  .field-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 8px;
  }
  .field-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 16px;
    padding: 14px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
    -webkit-appearance: none;
  }
  .field-input:focus { border-color: var(--gold-dim); }
  .weight-input { width: 140px; }
  textarea.field-input { resize: none; height: 80px; }

  /* ── Week view ── */
  .week-nav {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 16px;
  }
  .week-nav button {
    background: none; border: none;
    color: var(--text-dim); font-size: 20px;
    cursor: pointer; padding: 8px 14px;
    border-radius: 8px; min-width: 44px; min-height: 44px;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  }
  .week-nav button:hover { color: var(--gold); }
  .week-label { font-size: 14px; color: var(--text); font-weight: 500; }

  .week-grid { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .week-table { width: 100%; border-collapse: collapse; }
  .week-table th {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text-dim); padding: 4px 0 8px; text-align: center;
  }
  .week-table th.goal-th { text-align: left; padding-left: 4px; max-width: 100px; }
  .week-table td { padding: 3px 2px; text-align: center; vertical-align: middle; }
  .week-table td.goal-name-td {
    text-align: left; font-size: 11px; color: var(--text-dim);
    padding-left: 4px; white-space: nowrap;
    max-width: 100px; overflow: hidden; text-overflow: ellipsis;
  }
  .heat-cell {
    width: 32px; height: 32px; border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; cursor: pointer; transition: transform 0.1s;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  }
  .heat-cell:active { transform: scale(0.9); }
  .heat-on { background: var(--green); color: #fff; }
  .heat-off { background: var(--surface2); color: var(--text-mute); }
  .heat-today { outline: 2px solid var(--gold); outline-offset: 1px; }

  .week-scores {
    margin-top: 16px;
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .day-score-col { text-align: center; }
  .day-score-bar-wrap {
    height: 60px; display: flex;
    align-items: flex-end; justify-content: center; margin-bottom: 4px;
  }
  .day-score-bar {
    width: 20px; border-radius: 4px 4px 0 0;
    background: var(--gold-dim); transition: height 0.3s ease; min-height: 2px;
  }
  .day-score-bar.perfect { background: var(--gold); }
  .day-score-num { font-size: 10px; color: var(--text-dim); }
  .day-score-day { font-size: 9px; color: var(--text-mute); letter-spacing: 0.04em; text-transform: uppercase; }

  /* ── Summary ── */
  .summary-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 12px;
  }
  .summary-card-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 12px;
  }
  .summary-stat-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 6px 0; border-bottom: 1px solid var(--text-mute);
  }
  .summary-stat-row:last-child { border-bottom: none; }
  .summary-stat-label { font-size: 13px; color: var(--text-dim); }
  .summary-stat-val { font-size: 15px; font-weight: 600; color: var(--text); }
  .summary-stat-val.gold { color: var(--gold); }

  .streak-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--text-mute);
  }
  .streak-row:last-child { border-bottom: none; }
  .streak-icon { font-size: 16px; width: 22px; }
  .streak-name { font-size: 13px; color: var(--text-dim); flex: 1; }
  .streak-val { font-size: 14px; font-weight: 600; color: var(--gold); }

  .progress-bar-wrap { margin-top: 8px; }
  .progress-bar-label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--text-dim); margin-bottom: 4px;
  }
  .progress-bar-bg { height: 6px; background: var(--text-mute); border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.4s ease; }

  /* ── Weight chart ── */
  .weight-chart-svg { width: 100%; height: 100px; display: block; margin-bottom: 6px; }
  .chart-empty { text-align: center; color: var(--text-mute); font-size: 12px; padding: 20px 0; }

  /* ── Contribution graph ── */
  .contrib-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .contrib-wrap {
    display: inline-flex;
    flex-direction: column;
    gap: 0;
    min-width: max-content;
  }
  .contrib-month-row {
    display: flex;
    margin-left: 22px; /* align with grid */
    margin-bottom: 4px;
    height: 14px;
  }
  .contrib-month-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-mute);
    white-space: nowrap;
    overflow: visible;
  }
  .contrib-grid-row {
    display: flex;
    align-items: flex-start;
    gap: 0;
  }
  .contrib-day-labels {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-right: 4px;
    width: 18px;
    flex-shrink: 0;
  }
  .contrib-day-label {
    font-size: 8px;
    color: var(--text-mute);
    height: 11px;
    line-height: 11px;
    text-align: right;
  }
  .contrib-columns {
    display: flex;
    gap: 2px;
  }
  .contrib-col {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .contrib-cell {
    width: 11px;
    height: 11px;
    border-radius: 2px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    position: relative;
    flex-shrink: 0;
  }
  .contrib-cell:hover { transform: scale(1.35); z-index: 2; }
  .contrib-cell.future { opacity: 0.2; cursor: default; }
  .contrib-cell.future:hover { transform: none; }
  .contrib-cell.is-today { box-shadow: 0 0 0 1.5px var(--gold); }

  /* Score colour scale */
  .cs-0  { background: var(--surface2); }
  .cs-1  { background: rgba(200,169,110,0.18); }
  .cs-2  { background: rgba(200,169,110,0.32); }
  .cs-3  { background: rgba(200,169,110,0.46); }
  .cs-4  { background: rgba(200,169,110,0.58); }
  .cs-5  { background: rgba(200,169,110,0.70); }
  .cs-6  { background: rgba(200,169,110,0.84); }
  .cs-7  { background: #c8a96e; box-shadow: 0 0 5px rgba(200,169,110,0.55); }

  /* Tooltip */
  .contrib-tooltip {
    position: fixed;
    background: rgba(9,9,12,0.97);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 6px 10px;
    font-size: 11px;
    color: var(--text);
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
    transform: translate(-50%, -110%);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    display: none;
  }
  .contrib-tooltip.visible { display: block; }

  /* Legend */
  .contrib-legend {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 12px;
    justify-content: flex-end;
  }
  .contrib-legend-label {
    font-size: 10px;
    color: var(--text-mute);
  }
  .contrib-legend-cell {
    width: 11px; height: 11px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── Sync dot ── */
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-mute); flex-shrink: 0;
    cursor: pointer; transition: background 0.3s;
  }
  .sync-dot.ok { background: var(--green); }
  .sync-dot.syncing { background: var(--gold); animation: blink 1s ease-in-out infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ── Celebration overlay ── */
  #celebration {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0;
  }
  #celebration.show {
    animation: celebIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards,
               celebOut 0.4s ease 2.2s forwards;
  }
  .celebration-box {
    background: rgba(9,9,12,0.96);
    border: 1px solid var(--gold);
    border-radius: 22px;
    padding: 30px 50px;
    text-align: center;
    box-shadow: 0 0 80px rgba(200,169,110,0.2);
  }
  .celebration-emoji { font-size: 48px; display: block; margin-bottom: 10px; line-height: 1; }
  .celebration-text { font-size: 20px; font-weight: 700; color: var(--gold); letter-spacing: 0.04em; }
  .celebration-sub { font-size: 12px; color: var(--text-dim); margin-top: 5px; }
  @keyframes celebIn  { from { opacity:0; transform: scale(0.7); } to { opacity:1; transform: scale(1); } }
  @keyframes celebOut { from { opacity:1; transform: scale(1); } to { opacity:0; transform: scale(0.9); } }

  /* ── Setup modal ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(9,9,12,0.88);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px;
    max-width: 360px; width: 100%;
  }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
  .modal-body { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.6; }
  .modal-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 15px;
    padding: 12px 14px; outline: none; font-family: inherit; margin-bottom: 4px;
  }
  .modal-input:focus { border-color: var(--gold-dim); }
  .modal-btn {
    width: 100%; padding: 14px;
    background: var(--gold); color: var(--bg);
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 8px;
    touch-action: manipulation;
  }
  .modal-btn.secondary { background: none; border: 1px solid var(--border); color: var(--text-dim); }

  /* ── Strava ── */
  .strava-connect-btn {
    display: flex; align-items: center; justify-content: center; gap: 9px;
    width: 100%; padding: 13px 16px;
    background: #FC4C02; color: #fff;
    border: none; border-radius: 12px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
    margin-bottom: 4px;
  }
  .strava-connect-btn:active { opacity: 0.85; }
  .strava-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1px solid rgba(252,76,2,0.2);
    border-radius: 12px; padding: 10px 14px; margin-bottom: 4px;
  }
  .strava-wordmark {
    font-size: 10px; font-weight: 800; letter-spacing: 0.1em;
    text-transform: uppercase; color: #FC4C02; flex-shrink: 0;
  }
  .strava-info { flex: 1; min-width: 0; }
  .strava-athlete { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.2; }
  .strava-meta { font-size: 11px; color: var(--text-mute); margin-top: 1px; }
  .strava-sync-btn {
    background: none; border: 1px solid rgba(252,76,2,0.35);
    color: #FC4C02; border-radius: 8px; padding: 7px 13px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    flex-shrink: 0; transition: background 0.15s;
  }
  .strava-sync-btn:active { background: rgba(252,76,2,0.1); }
  .strava-sync-btn:disabled { opacity: 0.4; cursor: default; }
  .strava-goal-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #FC4C02; display: inline-block; flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- Contribution graph tooltip -->
<div id="contrib-tooltip" class="contrib-tooltip"></div>

<!-- Celebration overlay -->
<div id="celebration">
  <div class="celebration-box">
    <span class="celebration-emoji">🎉</span>
    <div class="celebration-text">Perfect Day!</div>
    <div class="celebration-sub">All 7 goals crushed.</div>
  </div>
</div>

<!-- Sync setup modal -->
<div id="setup-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-title">Enable Cross-Device Sync</div>
    <div class="modal-body">Enter your sync token to keep habits in sync across your iPhone and Mac. You'll set <code style="color:var(--gold)">SYNC_TOKEN</code> in your Vercel dashboard.</div>
    <input class="modal-input" id="token-input" type="text" placeholder="Paste your sync token"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="modal-btn" onclick="saveSyncToken()">Connect</button>
    <button class="modal-btn secondary" onclick="dismissSetup()">Skip for now</button>
  </div>
</div>

<div class="header">
  <div class="header-top">
    <div class="app-title">
      Project 40 Hardly
      <span id="sync-dot" class="sync-dot" onclick="openSetupModal()"></span>
    </div>
    <div class="countdown-badge">
      <div class="countdown-days" id="countdown-days">—</div>
      <div class="countdown-label">days to 40</div>
    </div>
  </div>
  <div class="date-nav">
    <button id="prev-day" onclick="shiftDay(-1)">‹</button>
    <div class="date-display" id="date-display"></div>
    <button id="next-day" onclick="shiftDay(1)">›</button>
  </div>
</div>

<!-- Today tab -->
<div class="section active" id="sec-today">
  <div class="score-wrap">
    <div class="ring-container">
      <svg viewBox="0 0 96 96" width="96" height="96">
        <circle class="ring-bg" cx="48" cy="48" r="42"/>
        <circle class="ring-fill" id="ring-fill" cx="48" cy="48" r="42"
          stroke-dasharray="263.9" stroke-dashoffset="263.9"/>
      </svg>
      <div class="ring-text">
        <div class="ring-score" id="ring-score">0</div>
        <div class="ring-total">/ 7</div>
      </div>
    </div>
  </div>

  <div class="goal-group-label">Morning habits</div>
  <div id="goals-morning"></div>

  <div class="goal-group-label">Challenge goals</div>
  <div id="goals-challenge"></div>

  <div class="field-group">
    <div class="field-label">Weight (lbs)</div>
    <input class="field-input weight-input" type="number" inputmode="decimal"
      id="weight-input" placeholder="—" step="0.1"
      onchange="saveField('weight', this.value ? parseFloat(this.value) : null)">
  </div>

  <div class="field-group">
    <div class="field-label">Daily note</div>
    <textarea class="field-input" id="note-input" placeholder="How'd it go?"
      oninput="saveField('note', this.value)"></textarea>
  </div>

  <div id="strava-section" style="margin-top:20px"></div>
</div>

<!-- Week tab -->
<div class="section" id="sec-week">
  <div class="week-nav">
    <button onclick="shiftWeek(-1)">‹</button>
    <div class="week-label" id="week-label"></div>
    <button onclick="shiftWeek(1)">›</button>
  </div>
  <div class="week-grid">
    <table class="week-table" id="week-table"></table>
  </div>
  <div class="week-scores" id="week-scores"></div>

<!-- Summary tab -->
<div class="section" id="sec-summary">
  <div id="summary-content"></div>
</div>

<!-- Bottom nav -->
<nav class="nav">
  <button class="nav-btn active" id="nav-today" onclick="switchTab('today')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    Today
  </button>
  <button class="nav-btn" id="nav-week" onclick="switchTab('week')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    Week
  </button>
  <button class="nav-btn" id="nav-summary" onclick="switchTab('summary')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
    Summary
  </button>

<script>
const STORAGE_KEY = "project40hardly_v1";
const GOALS = [
  { id: "walk",       label: "Morning Walk",       sub: "10–30 min",          icon: "🚶", group: "morning"   },
  { id: "stretch",    label: "Morning Stretch",     sub: "2–3 min",            icon: "🧘", group: "morning"   },
  { id: "pushups",    label: "Pushups",             sub: "after peeing",       icon: "💪", group: "morning"   },
  { id: "outside",    label: "Outside Exercise",    sub: "30 min minimum",     icon: "🏃", group: "challenge" },
  { id: "additional", label: "Additional Exercise", sub: "strength/core/yoga", icon: "🏋️", group: "challenge" },
  { id: "reading",    label: "Read Non-Fiction",    sub: "10+ pages",          icon: "📖", group: "challenge" },
  { id: "nutrition",  label: "Nutrition",           sub: "on plan",            icon: "🥗", group: "challenge" },
];

const BIRTHDAY = new Date(2026, 8, 28);
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

let data = {};
let currentDate = new Date();
let weekOffset  = 0;
let activeTab   = "today";

function toKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function todayKey() { return toKey(new Date()); }
function isToday(d) { return toKey(d) === todayKey(); }
function getDay(key) { return data[key] || {}; }
function getScore(key) { return GOALS.filter(g => data[key]?.[g.id]).length; }

// ── Streaks ──
function currentStreak(goalId) {
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 400; i++) {
    if (data[toKey(d)]?.[goalId]) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

// ── Sync ──
function getSyncToken() { return localStorage.getItem("p40_sync_token") || ""; }
function setSyncToken(t) { localStorage.setItem("p40_sync_token", t.trim()); }

function setSyncStatus(s) {
  const dot = document.getElementById("sync-dot");
  if (!dot) return;
  dot.className = "sync-dot" + (s ? " " + s : "");
  const labels = {
    "":        "Sync not set up — tap to configure",
    ok:        "Synced ✓ — tap to reconfigure",
    syncing:   "Syncing…",
    error:     "Sync error — tap to check token"
  };
  dot.title = labels[s] ?? "";
}

let syncSaveTimer = null;

async function syncLoad() {
  const token = getSyncToken();
  if (!token) return;
  setSyncStatus("syncing");
  try {
    const res = await fetch("/api/sync", { headers: { "x-sync-token": token } });
    if (res.status === 401) { setSyncStatus("error"); return; }
    if (!res.ok) throw new Error("fetch failed");
    const remote = await res.json();
    const hadLocalOnly = Object.keys(data).some(k => !remote[k]);
    data = { ...data, ...remote };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    if (hadLocalOnly) await pushToServer();
    else setSyncStatus("ok");
  } catch { setSyncStatus("error"); }
}

async function pushToServer() {
  const token = getSyncToken();
  if (!token) return;
  setSyncStatus("syncing");
  try {
    const res = await fetch("/api/sync", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-sync-token": token },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error("push failed");
    setSyncStatus("ok");
  } catch { setSyncStatus("error"); }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  clearTimeout(syncSaveTimer);
  syncSaveTimer = setTimeout(pushToServer, 600);
}

function load() {
  try { data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { data = {}; }
}

// ── Setup modal ──
function openSetupModal() {
  document.getElementById("token-input").value = getSyncToken();
  document.getElementById("setup-modal").style.display = "flex";
  setTimeout(() => document.getElementById("token-input").focus(), 100);
}
function dismissSetup() {
  document.getElementById("setup-modal").style.display = "none";
  localStorage.setItem("p40_setup_dismissed", "1");
}
function saveSyncToken() {
  const val = document.getElementById("token-input").value.trim();
  if (!val) return;
  setSyncToken(val);
  document.getElementById("setup-modal").style.display = "none";
  syncLoad().then(() => renderToday());
}

// ── Countdown ──
function updateCountdown() {
  const diff = Math.ceil((BIRTHDAY - new Date()) / 86400000);
  document.getElementById("countdown-days").textContent = diff > 0 ? diff : "🎉";
}

// ── Date nav ──
function shiftDay(delta) {
  const d = new Date(currentDate);
  d.setDate(d.getDate() + delta);
  if (d > new Date()) return;
  currentDate = d;
  renderToday();
  if (isToday(currentDate)) stravaAutoSync();
}

function renderDateDisplay() {
  const isTod = isToday(currentDate);
  const label = isTod
    ? `Today, ${MONTHS[currentDate.getMonth()]} ${currentDate.getDate()}`
    : `${DAYS[currentDate.getDay()]}, ${MONTHS[currentDate.getMonth()]} ${currentDate.getDate()}`;
  document.getElementById("date-display").innerHTML =
    label + (isTod ? '<span class="date-today-dot"></span>' : "");
  document.getElementById("next-day").disabled = isTod;
}

// ── Celebration ──
function showCelebration() {
  const el = document.getElementById("celebration");
  el.classList.remove("show");
  void el.offsetWidth;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2800);
}

// ── Goal rendering ──
function renderGoals() {
  const key = toKey(currentDate);
  const day = getDay(key);
  ["morning","challenge"].forEach(group => {
    const el = document.getElementById(`goals-${group}`);
    el.innerHTML = "";
    GOALS.filter(g => g.group === group).forEach(goal => {
      const checked = !!day[goal.id];
      const streak  = currentStreak(goal.id);
      const fire    = streak >= 3
        ? `<span style="font-size:13px;line-height:1" title="${streak}-day streak">🔥</span>`
        : "";
      const stravaChecked = data[key]?.strava_checked || [];
      const stravaPin = stravaChecked.includes(goal.id)
        ? `<span class="strava-goal-dot" title="Auto-checked by Strava"></span>`
        : "";
      const card = document.createElement("div");
      card.className = "goal-card" + (checked ? " checked" : "");
      card.innerHTML = `
        <div class="goal-icon">${goal.icon}</div>
        <div class="goal-text">
          <div class="goal-label">${goal.label}${fire}${stravaPin}</div>
          <div class="goal-sub">${goal.sub}</div>
        </div>
        <div class="goal-check">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,7 6,11 12,3"/>
          </svg>
        </div>`;
      card.onclick = () => toggleGoal(key, goal.id);
      el.appendChild(card);
    });
  });
}

function toggleGoal(key, goalId) {
  const prevScore = getScore(key);
  if (!data[key]) data[key] = {};
  data[key][goalId] = !data[key][goalId];
  save();
  if (getScore(key) === GOALS.length && prevScore < GOALS.length && isToday(currentDate)) {
    showCelebration();
  }
  renderToday();
}

function saveField(field, val) {
  const key = toKey(currentDate);
  if (!data[key]) data[key] = {};
  data[key][field] = val;
  save();
}

// ── Ring ──
function updateRing() {
  const score = getScore(toKey(currentDate));
  const circ  = 263.9;
  document.getElementById("ring-fill").style.strokeDashoffset = circ - circ * (score / GOALS.length);
  document.getElementById("ring-score").textContent = score;
}

function updateInputs() {
  const day = getDay(toKey(currentDate));
  document.getElementById("weight-input").value = day.weight != null ? day.weight : "";
  document.getElementById("note-input").value   = day.note || "";
}

function renderToday() {
  renderDateDisplay();
  renderStravaSection();
  renderGoals();
  updateRing();
  updateInputs();
}

// ── Week view ──
function getWeekStart(offset) {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + 1 + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}

function renderWeek() {
  const ws = getWeekStart(weekOffset);
  const we = new Date(ws); we.setDate(we.getDate() + 6);
  const fmt = d => `${MONTHS[d.getMonth()]} ${d.getDate()}`;
  document.getElementById("week-label").textContent = `${fmt(ws)} – ${fmt(we)}`;

  const days = Array.from({length:7}, (_, i) => {
    const d = new Date(ws); d.setDate(d.getDate() + i); return d;
  });

  let html = "<thead><tr><th class='goal-th'>Goal</th>";
  days.forEach(d => {
    html += `<th>${DAYS[d.getDay()]}<br><span style="font-size:9px;color:var(--text-mute)">${d.getDate()}</span></th>`;
  });
  html += "</tr></thead><tbody>";
  GOALS.forEach(goal => {
    html += `<tr><td class='goal-name-td'>${goal.icon} ${goal.label}</td>`;
    days.forEach(d => {
      const key  = toKey(d);
      const done = !!data[key]?.[goal.id];
      const cls  = "heat-cell " + (done ? "heat-on" : "heat-off") + (isToday(d) ? " heat-today" : "");
      html += `<td><div class="${cls}" onclick="jumpToDay('${key}')">${done ? "✓" : ""}</div></td>`;
    });
    html += "</tr>";
  });
  html += "</tbody>";
  document.getElementById("week-table").innerHTML = html;

  document.getElementById("week-scores").innerHTML = days.map(d => {
    const score   = getScore(toKey(d));
    const barH    = Math.max(2, Math.round((score / GOALS.length) * 60));
    const perfect = score === GOALS.length;
    return `<div class="day-score-col">
      <div class="day-score-bar-wrap">
        <div class="day-score-bar${perfect ? " perfect" : ""}" style="height:${barH}px"></div>
      </div>
      <div class="day-score-num">${score}</div>
      <div class="day-score-day">${DAYS[d.getDay()]}</div>
    </div>`;
  }).join("");
}

function shiftWeek(delta) {
  if (weekOffset + delta > 0) return;
  weekOffset += delta;
  renderWeek();
}

function jumpToDay(key) {
  const [y,m,d] = key.split("-").map(Number);
  currentDate = new Date(y, m-1, d);
  switchTab("today");
}

// ── Contribution graph ──
function renderContribGraph() {
  const JOURNEY_START = new Date(2026, 3, 15); // Apr 15
  const JOURNEY_END   = new Date(2026, 8, 28); // Sep 28
  const today         = new Date();
  today.setHours(0,0,0,0);

  // Rewind to the Monday on or before journey start
  const startMon = new Date(JOURNEY_START);
  const dow = startMon.getDay(); // 0=Sun
  const toMon = (dow === 0) ? -6 : 1 - dow;
  startMon.setDate(startMon.getDate() + toMon);

  // Advance to the Sunday on or after journey end
  const endSun = new Date(JOURNEY_END);
  const edow = endSun.getDay();
  if (edow !== 0) endSun.setDate(endSun.getDate() + (7 - edow));

  // Build week columns: each column = Mon–Sun
  const weeks = [];
  const cur = new Date(startMon);
  while (cur <= endSun) {
    const week = [];
    for (let d = 0; d < 7; d++) {
      week.push(new Date(cur));
      cur.setDate(cur.getDate() + 1);
    }
    weeks.push(week);
  }

  // Month label positions (column index where month first appears)
  const monthLabels = []; // { col, label }
  weeks.forEach((week, wi) => {
    const mon = week[0]; // Monday
    // Show label if this is the first week of a month visible in this column
    const hasNewMonth = week.some((d, di) => {
      if (d < JOURNEY_START || d > JOURNEY_END) return false;
      return d.getDate() === 1 || (di === 0 && d.getDate() <= 7 && wi === 0);
    });
    if (wi === 0) {
      // Always label the first column
      const firstVisible = week.find(d => d >= JOURNEY_START) || week[0];
      monthLabels.push({ col: wi, label: MONTHS[firstVisible.getMonth()] });
    } else if (hasNewMonth) {
      const firstOfMonth = week.find(d => d.getDate() === 1 && d >= JOURNEY_START && d <= JOURNEY_END);
      if (firstOfMonth) monthLabels.push({ col: wi, label: MONTHS[firstOfMonth.getMonth()] });
    }
  });

  // Month row: one span per week column
  const CELL = 13; // cell + gap
  let monthRowHtml = '<div class="contrib-month-row">';
  let lastLabelCol = -99;
  weeks.forEach((_, wi) => {
    const lbl = monthLabels.find(m => m.col === wi);
    if (lbl && wi - lastLabelCol > 1) {
      monthRowHtml += `<span class="contrib-month-label" style="width:${CELL}px">${lbl.label}</span>`;
      lastLabelCol = wi;
    } else {
      monthRowHtml += `<span style="width:${CELL}px;flex-shrink:0"></span>`;
    }
  });
  monthRowHtml += '</div>';

  // Day labels (Mon, Wed, Fri on rows 0,2,4 → indices 0=Mon,1=Tue,...,6=Sun)
  const DAY_ABBR = ['M','','W','','F','','S'];
  let dayLabelsHtml = '<div class="contrib-day-labels">';
  for (let r = 0; r < 7; r++) {
    dayLabelsHtml += `<div class="contrib-day-label">${DAY_ABBR[r]}</div>`;
  }
  dayLabelsHtml += '</div>';

  // Cells
  let colsHtml = '<div class="contrib-columns">';
  weeks.forEach((week) => {
    colsHtml += '<div class="contrib-col">';
    week.forEach((d) => {
      const key       = toKey(d);
      const inRange   = d >= JOURNEY_START && d <= JOURNEY_END;
      const isFuture  = d > today;
      const isT       = toKey(d) === todayKey();
      const score     = inRange ? getScore(key) : -1;

      let cls = 'contrib-cell';
      if (!inRange) {
        cls += ' cs-0';
        cls += ' future'; // invisible filler
      } else if (isFuture) {
        cls += ' cs-0 future';
      } else {
        cls += ` cs-${score}`;
      }
      if (isT) cls += ' is-today';

      const title = inRange
        ? `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()} — ${isFuture ? '–' : score + '/7'}`
        : '';

      const onclick = inRange && !isFuture
        ? `onclick="jumpToDay('${key}')" `
        : '';

      colsHtml += `<div class="${cls}" ${onclick}data-tip="${title}" style="${!inRange ? 'opacity:0;pointer-events:none' : ''}"></div>`;
    });
    colsHtml += '</div>';
  });
  colsHtml += '</div>';

  // Legend
  const legendHtml = `
    <div class="contrib-legend">
      <span class="contrib-legend-label">0</span>
      ${[0,1,2,3,4,5,6,7].map(s => `<div class="contrib-legend-cell cs-${s}"></div>`).join('')}
      <span class="contrib-legend-label">7</span>
    </div>`;

  return `
    <div class="contrib-scroll" id="contrib-scroll">
      <div class="contrib-wrap">
        ${monthRowHtml}
        <div class="contrib-grid-row">
          ${dayLabelsHtml}
          ${colsHtml}
        </div>
      </div>
    </div>
    ${legendHtml}`;
}

function initContribTooltip() {
  const tooltip = document.getElementById('contrib-tooltip');
  const scroll  = document.getElementById('contrib-scroll');
  if (!scroll || !tooltip) return;

  // Scroll to show today
  const today = new Date();
  today.setHours(0,0,0,0);
  const JOURNEY_START = new Date(2026, 3, 15);
  const startMon = new Date(JOURNEY_START);
  const dow = startMon.getDay();
  startMon.setDate(startMon.getDate() + ((dow === 0) ? -6 : 1 - dow));
  const weeksSinceStart = Math.floor((today - startMon) / (7 * 86400000));
  const CELL = 13;
  const scrollTarget = Math.max(0, (weeksSinceStart - 3) * CELL);
  scroll.scrollLeft = scrollTarget;

  scroll.addEventListener('mouseover', e => {
    const cell = e.target.closest('.contrib-cell');
    if (!cell || !cell.dataset.tip) { tooltip.classList.remove('visible'); return; }
    tooltip.textContent = cell.dataset.tip;
    tooltip.classList.add('visible');
  });
  scroll.addEventListener('mousemove', e => {
    tooltip.style.left = e.clientX + 'px';
    tooltip.style.top  = e.clientY + 'px';
  });
  scroll.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));

  // Touch: show tooltip briefly on tap (before jumpToDay fires)
  scroll.addEventListener('touchstart', e => {
    const cell = e.target.closest('.contrib-cell');
    if (!cell || !cell.dataset.tip) return;
    tooltip.textContent = cell.dataset.tip;
    tooltip.style.left  = e.touches[0].clientX + 'px';
    tooltip.style.top   = e.touches[0].clientY + 'px';
    tooltip.classList.add('visible');
    setTimeout(() => tooltip.classList.remove('visible'), 1200);
  }, { passive: true });
}

// ── Weight chart ──
function renderWeightChart(allKeys) {
  const pts = allKeys
    .filter(k => data[k]?.weight != null)
    .map(k => ({ key: k, w: data[k].weight }))
    .slice(-60);

  if (pts.length < 2) {
    return `<div class="chart-empty">Log weight on a few days to see your trend</div>`;
  }

  const ws    = pts.map(p => p.w);
  const minW  = Math.min(...ws);
  const maxW  = Math.max(...ws);
  const range = maxW - minW || 0.5;
  const n     = pts.length;

  const VW = 300, VH = 100, PX = 6, PY = 8;
  const coords = pts.map((p, i) => ({
    x: PX + (i / (n-1)) * (VW - PX*2),
    y: PY + (VH - PY*2) - ((p.w - minW) / range) * (VH - PY*2),
    w: p.w
  }));

  const line = coords.map((c,i) => `${i===0?"M":"L"}${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(" ");
  const area = `${line} L${coords[n-1].x.toFixed(1)},${VH-PY} L${coords[0].x.toFixed(1)},${VH-PY} Z`;

  const latest   = ws[n-1];
  const rawDiff  = (latest - ws[0]).toFixed(1);
  const diffStr  = rawDiff > 0 ? `+${rawDiff}` : `${rawDiff}`;
  const diffColor= rawDiff < 0 ? "var(--green)" : rawDiff > 0 ? "var(--red)" : "var(--text-dim)";
  const fmtDate  = k => k.slice(5).replace("-", "/");

  return `
    <svg class="weight-chart-svg" viewBox="0 0 ${VW} ${VH}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="var(--gold)" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="var(--gold)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${area}" fill="url(#wg)"/>
      <path d="${line}" fill="none" stroke="var(--gold)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${coords[0].x.toFixed(1)}" cy="${coords[0].y.toFixed(1)}" r="3" fill="var(--gold)" opacity="0.5"/>
      <circle cx="${coords[n-1].x.toFixed(1)}" cy="${coords[n-1].y.toFixed(1)}" r="3.5" fill="var(--gold)"/>
    </svg>
    <div style="display:flex;justify-content:space-between;align-items:baseline;font-size:11px;color:var(--text-mute)">
      <span>${fmtDate(pts[0].key)}</span>
      <span style="color:var(--text-dim)">
        <strong style="color:var(--text)">${latest} lbs</strong>
        ${rawDiff !== "0.0" ? `<span style="color:${diffColor};margin-left:5px">${diffStr}</span>` : ""}
      </span>
      <span>${fmtDate(pts[n-1].key)}</span>
    </div>`;
}

// ── Summary ──
function renderSummary() {
  const allKeys = Object.keys(data).sort();

  // Always render the contribution graph — it shows the full journey
  if (!allKeys.length) {
    document.getElementById("summary-content").innerHTML = `
      <div class="summary-card">
        <div class="summary-card-title">Journey to 40</div>
        ${renderContribGraph()}
      </div>
      <div style="text-align:center;color:var(--text-dim);padding:40px 20px">No data yet. Start checking off goals!</div>`;
    return;
  }

  const today        = new Date();
  const totalDays    = allKeys.length;
  const totalChecks  = allKeys.reduce((s,k) => s + getScore(k), 0);
  const perfectDays  = allKeys.filter(k => getScore(k) === GOALS.length).length;
  const overallPct   = Math.round(100 * totalChecks / (totalDays * GOALS.length));

  const journeyStart = new Date(2026, 3, 15);
  const daysToGo     = Math.max(0, Math.ceil((BIRTHDAY - today) / 86400000));
  const totalJourney = Math.ceil((BIRTHDAY - journeyStart) / 86400000);
  const journeyPct   = Math.min(100, Math.round(100 * Math.max(0, Math.floor((today - journeyStart) / 86400000)) / totalJourney));

  document.getElementById("summary-content").innerHTML = `
    <div class="summary-card">
      <div class="summary-card-title">Journey to 40</div>
      ${renderContribGraph()}
    </div>

    <div class="summary-card">
      <div class="summary-card-title">Overall</div>
      <div class="summary-stat-row">
        <span class="summary-stat-label">Days tracked</span>
        <span class="summary-stat-val">${totalDays}</span>
      </div>
      <div class="summary-stat-row">
        <span class="summary-stat-label">Perfect days</span>
        <span class="summary-stat-val gold">${perfectDays}</span>
      </div>
      <div class="summary-stat-row">
        <span class="summary-stat-label">Goal completion</span>
        <span class="summary-stat-val gold">${overallPct}%</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-label"><span>Journey to 40</span><span>${journeyPct}%</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${journeyPct}%"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-mute);margin-top:4px">
          <span>Apr 15</span><span>${daysToGo} days left</span><span>Sep 28</span>
        </div>
      </div>
    </div>

    <div class="summary-card">
      <div class="summary-card-title">Weight trend</div>
      ${renderWeightChart(allKeys)}
    </div>

    <div class="summary-card">
      <div class="summary-card-title">Current streaks</div>
      ${GOALS.map(g => {
        const s    = currentStreak(g.id);
        const fire = s >= 3 ? " 🔥" : "";
        return `<div class="streak-row">
          <div class="streak-icon">${g.icon}</div>
          <div class="streak-name">${g.label}</div>
          <div class="streak-val">${s} ${s === 1 ? "day" : "days"}${fire}</div>
        </div>`;
      }).join("")}
    </div>

    <div class="summary-card">
      <div class="summary-card-title">Goal breakdown</div>
      ${GOALS.map(g => {
        const count = allKeys.filter(k => data[k]?.[g.id]).length;
        const pct   = totalDays ? Math.round(100 * count / totalDays) : 0;
        return `<div class="progress-bar-wrap" style="margin-bottom:12px">
          <div class="progress-bar-label"><span>${g.icon} ${g.label}</span><span>${pct}%</span></div>
          <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        </div>`;
      }).join("")}
    </div>`;
}

// ── Tab switching ──
function switchTab(tab) {
  activeTab = tab;
  ["today","week","summary"].forEach(t => {
    document.getElementById(`sec-${t}`).classList.toggle("active", t === tab);
    document.getElementById(`nav-${t}`).classList.toggle("active", t === tab);
  });
  if (tab === "week")    renderWeek();
  if (tab === "summary") { renderSummary(); initContribTooltip(); }
}

// ── Strava ──
const STRAVA_CLIENT_ID   = "207897";
const STRAVA_REDIRECT    = "https://project-40-hardly.vercel.app";
let   stravaState        = "idle"; // idle | syncing | error

function getStravaToken()   { return localStorage.getItem("strava_access_token") || ""; }
function getStravaRefresh() { return localStorage.getItem("strava_refresh_token") || ""; }
function getStravaExpiry()  { return parseInt(localStorage.getItem("strava_expires_at") || "0"); }
function getStravaAthlete() {
  try { return JSON.parse(localStorage.getItem("strava_athlete") || "null"); } catch { return null; }
}
function clearStrava() {
  ["strava_access_token","strava_refresh_token","strava_expires_at","strava_athlete"]
    .forEach(k => localStorage.removeItem(k));
}
function stravaIsConnected() { return !!(getStravaToken() || getStravaRefresh()); }

function stravaConnect() {
  const url = `https://www.strava.com/oauth/authorize`
    + `?client_id=${STRAVA_CLIENT_ID}`
    + `&redirect_uri=${encodeURIComponent(STRAVA_REDIRECT)}`
    + `&response_type=code`
    + `&scope=activity:read_all`
    + `&approval_prompt=auto`;
  window.location.href = url;
}

async function stravaExchangeCode(code) {
  const res = await fetch(`/api/strava-auth?code=${encodeURIComponent(code)}`);
  if (!res.ok) {
    let msg = `HTTP ${res.status}`;
    try { const e = await res.json(); msg = e.message || e.error || JSON.stringify(e); } catch {}
    throw new Error(msg);
  }
  const d = await res.json();
  localStorage.setItem("strava_access_token", d.access_token);
  localStorage.setItem("strava_refresh_token", d.refresh_token);
  localStorage.setItem("strava_expires_at",    d.expires_at);
  if (d.athlete) localStorage.setItem("strava_athlete", JSON.stringify(d.athlete));
}

async function stravaFreshToken() {
  const now = Math.floor(Date.now() / 1000);
  if (getStravaToken() && now < getStravaExpiry() - 60) return getStravaToken();
  const refresh = getStravaRefresh();
  if (!refresh) return null;
  const res = await fetch(`/api/strava-auth?refresh_token=${encodeURIComponent(refresh)}`);
  if (!res.ok) { clearStrava(); return null; }
  const d = await res.json();
  localStorage.setItem("strava_access_token", d.access_token);
  localStorage.setItem("strava_refresh_token", d.refresh_token);
  localStorage.setItem("strava_expires_at",    d.expires_at);
  return d.access_token;
}

async function stravaSyncToday() {
  if (!isToday(currentDate)) return;
  const token = await stravaFreshToken();
  if (!token) { stravaConnect(); return; }

  stravaState = "syncing";
  renderStravaSection();

  const key   = toKey(currentDate);
  const start = new Date(); start.setHours(0,0,0,0);
  const end   = new Date(); end.setHours(23,59,59,999);

  try {
    const res = await fetch(
      `https://www.strava.com/api/v3/athlete/activities`
        + `?after=${Math.floor(start/1000)}`
        + `&before=${Math.floor(end/1000)}`
        + `&per_page=30`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (res.status === 401) { clearStrava(); stravaState = "error"; renderStravaSection(); return; }
    if (!res.ok) throw new Error("API error");

    const activities = await res.json();
    if (!data[key]) data[key] = {};

    // sport_type buckets
    const STRENGTH_TYPES = new Set([
      'WeightTraining','Yoga','Pilates','Crossfit','Stretching','Elliptical','StairStepper'
    ]);

    let walkedToday  = false;
    let outsideCount = 0;
    let strengthCount = 0;

    for (const a of activities) {
      const t        = a.sport_type || a.type || '';
      const duration = a.moving_time || a.elapsed_time || 0;
      if (t === 'Walk') {
        // Walks count toward morning walk goal (10+ min), not outside exercise
        if (duration >= 600) walkedToday = true;
      } else if (STRENGTH_TYPES.has(t)) {
        strengthCount++;
      } else {
        // Everything else (Run, Ride, Hike, Swim, …)
        if (duration >= 1800) outsideCount++;  // 30+ min → outside exercise
        else                  strengthCount++; // short but intentional
      }
    }

    // additional = strength/gym work OR a second cardio session beyond outside
    const hasAdditional = strengthCount > 0 || outsideCount > 1;

    const checked = [];
    if (walkedToday)   { data[key].walk       = true; checked.push("walk"); }
    if (outsideCount)  { data[key].outside     = true; checked.push("outside"); }
    if (hasAdditional) { data[key].additional  = true; checked.push("additional"); }
    data[key].strava_checked       = checked;
    data[key].strava_synced_at     = Date.now();
    data[key].strava_activity_count = activities.length;

    stravaState = "idle";
    save();
    renderToday();
  } catch {
    stravaState = "error";
    renderStravaSection();
  }
}

function stravaDisconnect() {
  if (!confirm("Disconnect Strava?")) return;
  clearStrava();
  stravaState = "idle";
  renderStravaSection();
}

function renderStravaSection() {
  const el = document.getElementById("strava-section");
  if (!el) return;

  if (!stravaIsConnected()) {
    const authErr = stravaState.startsWith?.("auth_error:") ? stravaState.slice(11) : null;
    el.innerHTML = `
      <button class="strava-connect-btn" onclick="stravaConnect()">
        <span style="font-weight:800;letter-spacing:0.08em;font-size:12px">STRAVA</span>
        Connect to auto-check exercise goals
      </button>
      ${authErr ? `<div style="font-size:11px;color:var(--red);text-align:center;margin-top:4px;padding:0 4px">Connection failed: ${authErr}. Check STRAVA_CLIENT_SECRET in Vercel.</div>` : ""}`;
    return;
  }

  const athlete  = getStravaAthlete();
  const key      = toKey(currentDate);
  const syncedAt = data[key]?.strava_synced_at;
  const count    = data[key]?.strava_activity_count ?? null;
  const syncing  = stravaState === "syncing";

  let meta;
  if (syncing) {
    meta = "Syncing…";
  } else if (stravaState === "error") {
    meta = "Sync failed — tap to retry";
  } else if (syncedAt) {
    const diff = Date.now() - syncedAt;
    const ago  = diff < 60000 ? "just now"
               : diff < 3600000 ? `${Math.floor(diff/60000)}m ago`
               : `${Math.floor(diff/3600000)}h ago`;
    meta = count > 0
      ? `${count} activit${count === 1 ? "y" : "ies"} · synced ${ago}`
      : `No activities today · synced ${ago}`;
  } else {
    meta = isToday(currentDate) ? "Tap Sync to check today's activities" : "";
  }

  el.innerHTML = `
    <div class="strava-row">
      <span class="strava-wordmark">Strava</span>
      <div class="strava-info">
        ${athlete?.firstname ? `<div class="strava-athlete">${athlete.firstname}</div>` : ""}
        <div class="strava-meta">${meta}</div>
      </div>
      ${isToday(currentDate)
        ? `<button class="strava-sync-btn" onclick="stravaSyncToday()" ${syncing ? "disabled" : ""}>${syncing ? "…" : "Sync"}</button>`
        : ""}
    </div>`;
}

function stravaAutoSync() {
  if (!stravaIsConnected() || !isToday(currentDate)) return;
  const key      = toKey(currentDate);
  const count    = data[key]?.strava_activity_count ?? null;
  const lastSync = data[key]?.strava_synced_at     || 0;
  // Already found activities today — nothing more to do
  if (count > 0) return;
  // No activities yet — retry every 30 min in case they work out later
  if (Date.now() - lastSync < 30 * 60 * 1000) return;
  stravaSyncToday();
}

// ── Init ──
load();
updateCountdown();

// Handle Strava OAuth callback (?code=... in URL after redirect)
(function () {
  const p    = new URLSearchParams(window.location.search);
  const code = p.get("code");
  const err  = p.get("error");
  if (code || err) window.history.replaceState({}, "", window.location.pathname);
  if (err) { stravaState = "auth_error:" + err; renderToday(); }
  if (code) stravaExchangeCode(code)
    .then(() => renderToday())
    .catch(e => { stravaState = "auth_error:" + (e.message || "unknown"); renderToday(); });
})();

renderToday();
stravaAutoSync();
setInterval(updateCountdown, 60000);

if (getSyncToken()) {
  setSyncStatus("syncing");
  syncLoad().then(() => renderToday());
} else {
  setSyncStatus("");
  if (!localStorage.getItem("p40_setup_dismissed")) {
    setTimeout(() => { document.getElementById("setup-modal").style.display = "flex"; }, 800);
  }
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
